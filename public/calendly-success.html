<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Confirmed</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #ffffff;
      color: #0f172a;
    }
    .card {
      text-align: center;
      padding: 32px 24px;
      max-width: 360px;
    }
    .check {
      font-size: 56px;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 13px;
      line-height: 1.6;
      color: #64748b;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="check">✅</div>
    <h1>Interview booked!</h1>
    <p>You'll receive a confirmation email from Calendly with the meeting details and the Google Meet link.</p>
  </div>
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        var data = {};
        params.forEach(function (value, key) { data[key] = value; });
        if (window.parent && window.parent !== window) {
          window.parent.postMessage({ type: 'calendly_booked', data: data }, '*');
        }
      } catch (err) {
        // ignore — parent may handle fallback via calendly.event_scheduled
      }
    })();
  </script>
</body>
</html>
